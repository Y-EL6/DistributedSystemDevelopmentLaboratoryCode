spring:
  cloud:
    gateway:
      routes:
        # 用户服务路由
        - id: user-service
          uri: lb://user-service  # 负载均衡转发到注册中心的用户服务
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        # 订单服务路由
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        # 商家与菜品服务路由
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/v1/restaurants/**, /api/v1/menus/**